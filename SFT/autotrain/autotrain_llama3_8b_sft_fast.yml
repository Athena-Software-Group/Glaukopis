### Full-parameter SFT of Llama-3.1-8B-Instruct on athena-ift, tuned for
### 2x 80 GB-class GPUs (2x H100 80G, 2x A100 80G) via DeepSpeed ZeRO-3.
###
### Why DeepSpeed is mandatory here:
### AutoTrain 0.8.36 loads the base model in fp32 regardless of the
### mixed_precision setting (only autocast is bf16, storage is still fp32).
### Full SFT of an 8B model therefore needs, per GPU in plain DDP:
###   weights (fp32)              : 32 GB
###   gradients (fp32)            : 32 GB
###   AdamW states m+v (fp32)     : 64 GB
###   activations (batch=4, ckpt) : ~6 GB
###   -------------------------------------------------------------------
###   TOTAL in DDP                : ~134 GB / GPU  -> will OOM on 80 GB
###
### DeepSpeed ZeRO-3 shards weights/gradients/optimizer across the 2 GPUs:
###   weights (sharded)           : 16 GB
###   gradients (sharded)         : 16 GB
###   AdamW states (sharded)      : 32 GB
###   activations                 : ~6 GB
###   -------------------------------------------------------------------
###   TOTAL with ZeRO-3           : ~70 GB / GPU   -> fits on 80 GB
###
### NOTE: project_name must be alphanumeric + hyphens only (no dots).
### NOTE: autotrain's gradient-ckpt key is `disable_gradient_checkpointing`
###       (an inverted boolean). `gradient_checkpointing: <bool>` is silently
###       ignored by autotrain with a "parameters not used" warning.

task: llm-sft
base_model: meta-llama/Llama-3.1-8B-Instruct
project_name: llama31-8b-athena-ift
log: wandb
backend: local
distributed_backend: deepspeed      # ZeRO-3 sharding (see memory table above)

data:
  path: ${HF_USERNAME}/athena-ift
  train_split: train
  valid_split: null
  chat_template: null         # text column is already templated
  column_mapping:
    text_column: text

params:
  # --- full SFT, no adapter, no quantization -------------------------------
  peft: false
  quantization: null
  # -------------------------------------------------------------------------
  block_size: 2048
  model_max_length: 8192
  epochs: 3
  batch_size: 2                     # ZeRO-3 sharded; conservative for 80 GB
  gradient_accumulation: 4          # effective batch = 2 * 4 * 2 GPUs = 16
  lr: 1.0e-5
  optimizer: adamw_torch
  scheduler: cosine
  warmup_ratio: 0.05
  mixed_precision: bf16
  use_flash_attention_2: true       # saves ~5-8 GB on attention activations
  padding: right
  disable_gradient_checkpointing: false   # autotrain's actual key (inverted)
  logging_steps: 25
  save_total_limit: 2
  seed: 42

hub:
  username: ${HF_USERNAME}
  token: ${HF_TOKEN}
  push_to_hub: true
