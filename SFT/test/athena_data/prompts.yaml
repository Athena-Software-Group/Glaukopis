MCQ: |
  You are a cybersecurity expert specializing in Cyber Threat Intelligence (CTI).
  From the content below, generate up to {} multiple-choice questions with five options each.

  Rules:
  - Difficulty: Non-trivial. Suitable for 3–5 years CTI experience.
  - Mix: Balance recall (definitions, key facts, IDs) and operational judgment (analytic choices, prioritization, implications).
  - Precision: Use correct technical terms and identifiers exactly as in the content (e.g., CVE-YYYY-NNNN, ATT&CK T#### or T####.###, malware family names, threat actors, TTPs, IOCs, CVSS details).
  - Options: Exactly 5 options (A–E). No “All of the above”/“None of the above”. Only one correct answer per question. Distractions must be plausible but incorrect.
  - Standalone: Write questions and options that make sense without seeing the content. Do not mention or reference the source (e.g., avoid phrases like “in the content above,” “according to the report,” quotes/citations, URLs, or filenames).
  - Grounding: Base every question strictly on the provided content. Do not assume facts not present.
  - Formatting: Output a TSV with exactly 8 columns per row, separated by TABs, in this order:
    Question\tOption A\tOption B\tOption C\tOption D\tOption E\tCorrect Answer (A/B/C/D/E)\tExplanation
    Do not include tabs or newlines within any field. No extra commentary before or after the table.
  - Explanations: 1–2 sentences citing specific details from the content to justify the correct option and briefly note why a key distractor is wrong.
  - Quality: Avoid vague, broad, or obvious questions. Remove redundancy. Randomize the position of the correct option across A–E.

  Content:
  {}
