<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Figure 1</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #ffffff; }
body { font-family: Arial, sans-serif; padding: 36px 48px; }
svg text { font-family: Arial, sans-serif; }
.th  { font-size: 14px; font-weight: 700; }
.ts  { font-size: 12px; font-weight: 400; }
.c-blue   rect { fill: #E6F1FB; stroke: #185FA5; stroke-width:0.7; }
.c-blue   text { fill: #0C447C; }
.c-blue   circle { fill: #185FA5; }
.c-amber  rect { fill: #FAEEDA; stroke: #BA7517; }
.c-amber  text { fill: #633806; }
.c-amber  circle { fill: #BA7517; }
.c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width:0.7; }
.c-teal   text { fill: #085041; }
.c-teal   circle { fill: #0F6E56; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; stroke-width:0.7; }
.c-purple text { fill: #3C3489; }
.c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width:0.7; }
.c-gray   text { fill: #444441; }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 700 510" role="img" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Internet / Customers / Partners – two-line label centered over External edge (center≈113) -->
<g class="c-gray">
<rect x="20" y="12" width="186" height="38" rx="6"/>
<text class="th" x="113" y="25" text-anchor="middle" dominant-baseline="central">Internet / customers</text>
<text class="th" x="113" y="43" text-anchor="middle" dominant-baseline="central">/ partners</text>
</g>
<line x1="113" y1="50" x2="113" y2="66" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#a)"/>

<!-- ── EXTERNAL APPLICATION EDGE ── -->
<g class="c-blue">
<rect x="20" y="68" width="185" height="186" rx="10"/>
<text class="th" x="112" y="90" text-anchor="middle" dominant-baseline="central">External application edge</text>
<line x1="32" y1="102" x2="193" y2="102" stroke="#185FA5" stroke-width="0.4" opacity="0.6"/>
<circle cx="36" cy="119" r="2.5"/>
<text class="ts" x="46" y="119" dominant-baseline="central">Web and API traffic only</text>
<circle cx="36" cy="139" r="2.5"/>
<text class="ts" x="46" y="139" dominant-baseline="central">Reverse proxy / WAF gate</text>
<circle cx="36" cy="159" r="2.5"/>
<text class="ts" x="46" y="159" dominant-baseline="central">Rate limits, abuse-IP controls</text>
<circle cx="36" cy="179" r="2.5"/>
<text class="ts" x="46" y="179" dominant-baseline="central">NIDS network telemetry</text>
<circle cx="36" cy="199" r="2.5"/>
<text class="ts" x="46" y="199" dominant-baseline="central">TTL-bounded auto blocks</text>
<circle cx="36" cy="219" r="2.5"/>
<text class="ts" x="46" y="219" dominant-baseline="central">Exception review queue</text>
</g>

<!-- Arrow External → Protected -->
<line x1="207" y1="160" x2="234" y2="160" stroke="#185FA5" stroke-width="1.6" marker-end="url(#a)"/>

<!-- ── PROTECTED SaaS PLATFORM ── -->
<g class="c-amber">
<rect x="236" y="68" width="210" height="186" rx="10" style="stroke-width:1.2"/>
<text class="th" x="341" y="87" text-anchor="middle" dominant-baseline="central">Protected SaaS platform</text>
<text class="ts" x="341" y="104" text-anchor="middle" dominant-baseline="central" style="font-style:italic">and regulated data</text>
<line x1="248" y1="115" x2="434" y2="115" stroke="#BA7517" stroke-width="0.4" opacity="0.6"/>
<circle cx="252" cy="131" r="2.5"/>
<text class="ts" x="262" y="131" dominant-baseline="central">Application services and APIs</text>
<circle cx="252" cy="151" r="2.5"/>
<text class="ts" x="262" y="151" dominant-baseline="central">Admin plane separated</text>
<circle cx="252" cy="171" r="2.5"/>
<text class="ts" x="262" y="171" dominant-baseline="central">Cloud control plane</text>
<circle cx="252" cy="191" r="2.5"/>
<text class="ts" x="262" y="191" dominant-baseline="central">Secrets and tenant data stores</text>
<circle cx="252" cy="211" r="2.5"/>
<text class="ts" x="262" y="211" dominant-baseline="central">Least-privilege data access</text>
</g>

<!-- Arrow Internal → Protected -->
<line x1="472" y1="160" x2="448" y2="160" stroke="#0F6E56" stroke-width="1.6" marker-end="url(#a)"/>

<!-- ── INTERNAL DISTRIBUTED ENTERPRISE ── -->
<g class="c-teal">
<rect x="474" y="68" width="206" height="186" rx="10"/>
<text class="th" x="577" y="87" text-anchor="middle" dominant-baseline="central">Internal distributed</text>
<text class="th" x="577" y="104" text-anchor="middle" dominant-baseline="central">enterprise</text>
<line x1="486" y1="115" x2="668" y2="115" stroke="#0F6E56" stroke-width="0.4" opacity="0.6"/>
<circle cx="490" cy="131" r="2.5"/>
<text class="ts" x="500" y="131" dominant-baseline="central">Managed and BYOD devices</text>
<circle cx="490" cy="151" r="2.5"/>
<text class="ts" x="500" y="151" dominant-baseline="central">ZTNA / VPN as channel</text>
<circle cx="490" cy="171" r="2.5"/>
<text class="ts" x="500" y="171" dominant-baseline="central">JIT privilege, step-up auth</text>
<circle cx="490" cy="191" r="2.5"/>
<text class="ts" x="500" y="191" dominant-baseline="central">Behavioral baselining</text>
<circle cx="490" cy="211" r="2.5"/>
<text class="ts" x="500" y="211" dominant-baseline="central">Service identity, mTLS</text>
</g>

<!-- Dashed drop/rise arrows to telemetry -->
<line x1="115" y1="256" x2="115" y2="300" stroke="#185FA5" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a)"/>
<line x1="341" y1="256" x2="341" y2="300" stroke="#BA7517" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a)"/>
<line x1="577" y1="256" x2="577" y2="300" stroke="#0F6E56" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a)"/>
<line x1="101" y1="300" x2="101" y2="256" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a)"/>
<line x1="327" y1="300" x2="327" y2="256" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a)"/>
<line x1="563" y1="300" x2="563" y2="256" stroke="#534AB7" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#a)"/>

<!-- ── UNIFIED TELEMETRY PLANE ── -->
<g class="c-purple">
<rect x="20" y="302" width="660" height="148" rx="10"/>
<text class="th" x="350" y="324" text-anchor="middle" dominant-baseline="central">Unified telemetry and policy plane</text>
<line x1="32" y1="336" x2="668" y2="336" stroke="#534AB7" stroke-width="0.4" opacity="0.5"/>
</g>
<circle cx="38"  cy="354" r="2.5" fill="#534AB7"/>
<text class="ts" x="48"  y="354" dominant-baseline="central" fill="#3C3489">SIEM, EDR, XDR log ingestion</text>
<circle cx="38"  cy="372" r="2.5" fill="#534AB7"/>
<text class="ts" x="48"  y="372" dominant-baseline="central" fill="#3C3489">NIDS and WAF event streams</text>
<circle cx="38"  cy="390" r="2.5" fill="#534AB7"/>
<text class="ts" x="48"  y="390" dominant-baseline="central" fill="#3C3489">IAM and ZTNA session signals</text>
<circle cx="38"  cy="408" r="2.5" fill="#534AB7"/>
<text class="ts" x="48"  y="408" dominant-baseline="central" fill="#3C3489">Cloud and data-access audit logs</text>

<circle cx="360" cy="354" r="2.5" fill="#534AB7"/>
<text class="ts" x="370" y="354" dominant-baseline="central" fill="#3C3489">Entity resolution and correlation</text>
<circle cx="360" cy="372" r="2.5" fill="#534AB7"/>
<text class="ts" x="370" y="372" dominant-baseline="central" fill="#3C3489">Case assembly, AI-assisted triage</text>
<circle cx="360" cy="390" r="2.5" fill="#534AB7"/>
<text class="ts" x="370" y="390" dominant-baseline="central" fill="#3C3489">Bounded autonomous response</text>
<circle cx="360" cy="408" r="2.5" fill="#534AB7"/>
<text class="ts" x="370" y="408" dominant-baseline="central" fill="#3C3489">Compliance evidence generation</text>

<!-- Footer caption -->
<text class="ts" x="350" y="474" text-anchor="middle" fill="#888780">Design rule: constrain exposure at the edge, constrain capability inside, one evidence plane underneath both.</text>
</svg>
</body>
</html>
