<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .title { font: 700 18px Arial, sans-serif; }
      .label { font: 14px Arial, sans-serif; }
      .small { font: 12px Arial, sans-serif; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 1.5; rx: 10; ry: 10; }
      .group { fill: none; stroke: #111827; stroke-width: 1.5; rx: 14; ry: 14; }
      .arrow { stroke: #111827; stroke-width: 1.8; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827"/>
    </marker>
  </defs>

  <!-- Group titles -->
  <text x="150" y="34" class="title">CTI Data Layer</text>
  <text x="560" y="34" class="title">Template-to-Dataset Generation</text>
  <text x="1025" y="34" class="title">Training + AthenaBench Iteration</text>

  <!-- Group outlines -->
  <rect x="40" y="50" width="420" height="660" class="group"/>
  <rect x="480" y="50" width="420" height="660" class="group"/>
  <rect x="920" y="50" width="440" height="660" class="group"/>

  <!-- Left column boxes -->
  <rect x="70" y="90" width="360" height="120" class="box"/>
  <text x="250" y="118" text-anchor="middle" class="label">CTI Sources</text>
  <text x="250" y="145" text-anchor="middle" class="small">ATT&amp;CK, CVE/NVD, CWE, CAPEC, ENGAGE</text>
  <text x="250" y="165" text-anchor="middle" class="small">EPSS, CISA KEV, Sigma/CAR/Wazuh, Proprietary CTI</text>

  <rect x="70" y="250" width="360" height="110" class="box"/>
  <text x="250" y="280" text-anchor="middle" class="label">Ingest &amp; Normalize</text>
  <text x="250" y="307" text-anchor="middle" class="small">ETL, STIX parsers, dedupe</text>
  <text x="250" y="327" text-anchor="middle" class="small">version/time metadata</text>

  <rect x="70" y="400" width="360" height="170" class="box"/>
  <text x="250" y="430" text-anchor="middle" class="label">CTI Knowledge Graph (Neo4j)</text>
  <text x="250" y="457" text-anchor="middle" class="small">Nodes: Technique, Malware, Tool, Actor, CVE/CWE/CAPEC</text>
  <text x="250" y="477" text-anchor="middle" class="small">Mitigation, Data Component</text>
  <text x="250" y="504" text-anchor="middle" class="small">Edges: USES, MITIGATES, DETECTS, EXPLOITS</text>
  <text x="250" y="524" text-anchor="middle" class="small">IMPLEMENTS, ATTRIBUTED_TO</text>

  <!-- Middle column boxes -->
  <rect x="510" y="165" width="360" height="150" class="box"/>
  <text x="690" y="195" text-anchor="middle" class="label">IFT Template Layer</text>
  <text x="690" y="222" text-anchor="middle" class="small">Bindings, traversals, any/all filters</text>
  <text x="690" y="242" text-anchor="middle" class="small">negative constraints, cross-source joins</text>
  <text x="690" y="262" text-anchor="middle" class="small">recency windows</text>

  <rect x="510" y="345" width="360" height="130" class="box"/>
  <text x="690" y="375" text-anchor="middle" class="label">Template Execution Engine</text>
  <text x="690" y="402" text-anchor="middle" class="small">Enumerate/sample bindings</text>
  <text x="690" y="422" text-anchor="middle" class="small">enforce constraints</text>
  <text x="690" y="442" text-anchor="middle" class="small">positives + hard negatives</text>

  <rect x="510" y="505" width="360" height="120" class="box"/>
  <text x="690" y="535" text-anchor="middle" class="label">IFT Dataset (JSON)</text>
  <text x="690" y="562" text-anchor="middle" class="small">{instruction, question, answer, metadata}</text>
  <text x="690" y="582" text-anchor="middle" class="small">template_id, source_versions, timestamps</text>

  <!-- Right column boxes -->
  <rect x="950" y="220" width="380" height="120" class="box"/>
  <text x="1140" y="250" text-anchor="middle" class="label">Instruction Fine-Tuning (SFT)</text>
  <text x="1140" y="277" text-anchor="middle" class="small">SLM/LLM fine-tune on IFT JSON</text>
  <text x="1140" y="297" text-anchor="middle" class="small">optional: CoT, RLAIF/RLHF</text>

  <rect x="950" y="370" width="380" height="150" class="box"/>
  <text x="1140" y="400" text-anchor="middle" class="label">Evaluation on AthenaBench</text>
  <text x="1140" y="427" text-anchor="middle" class="small">Dynamic CTI benchmark tasks:</text>
  <text x="1140" y="447" text-anchor="middle" class="small">CKT, RCM, VSP, TAA, RMS, ATE</text>
  <text x="1140" y="474" text-anchor="middle" class="small">Metrics + aggregated score</text>

  <rect x="950" y="550" width="380" height="120" class="box"/>
  <text x="1140" y="580" text-anchor="middle" class="label">Error Analysis &amp; Iteration</text>
  <text x="1140" y="607" text-anchor="middle" class="small">Failures → template updates</text>
  <text x="1140" y="627" text-anchor="middle" class="small">graph coverage fixes, data refresh</text>

  <!-- Arrows: left flow -->
  <path d="M 250 210 L 250 250" class="arrow"/>
  <path d="M 250 360 L 250 400" class="arrow"/>

  <!-- Arrow: graph to templates -->
  <path d="M 430 485 C 480 485, 480 240, 510 240" class="arrow"/>

  <!-- Middle flow -->
  <path d="M 690 315 L 690 345" class="arrow"/>
  <path d="M 690 475 L 690 505" class="arrow"/>

  <!-- JSON to training -->
  <path d="M 870 565 C 920 565, 920 280, 950 280" class="arrow"/>

  <!-- Training to eval to analysis -->
  <path d="M 1140 340 L 1140 370" class="arrow"/>
  <path d="M 1140 520 L 1140 550" class="arrow"/>

  <!-- Feedback loops -->
  <path d="M 950 610 C 860 610, 860 240, 870 240" class="arrow"/>
  <path d="M 950 610 C 720 610, 480 335, 430 335" class="arrow"/>

</svg>
